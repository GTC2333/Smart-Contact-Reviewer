# smart_contact_audit/config/settings.yaml
# 现有配置保持不变，新增模型、超参数、API、前端配置
frontend:
  title: "智能合同审核系统"
  port: 8501
  theme:
    primaryColor: "#FF6B6B"
    backgroundColor: "#FFFFFF"
    secondaryBackgroundColor: "#F0F2F6"
    textColor: "#262730"

backend_api:
  host: "127.0.0.1"
  port: 8000
  endpoint_audit: "/audit"

# ------------------- 模型 & 超参数 -------------------
agents:
  contract_formatter:
    model: "gpt-4o-mini"
    temperature: 0.0
    max_tokens: 2000
  law_search:
    model: "gpt-4o-mini"
    temperature: 0.0
    max_tokens: 800
  risk_annotator:
    model: "gpt-4o-mini"
    temperature: 0.0
    max_tokens: 1000
  correction:
    model: "gpt-4o-mini"
    temperature: 0.0
    max_tokens: 1500

# ------------------- LLM 配置（新增完整结构） -------------------
llm:
  provider: "deepseek"        # openai | azure | anthropic | gemini | deepseek
  openai:
    api_key: ""  # 在 local.yaml 中配置
    base_url: "https://api.openai.com/v1"  # 可设为 null 或代理地址
  azure:
    api_key: ""
    endpoint: "https://xxx.openai.azure.com/"
    api_version: "2024-02-01"
    deployment: "gpt-4o-mini"
  anthropic:
    api_key: ""
    base_url: null
  gemini:
    api_key: ""
  deepseek:
    api_key: ""  # 在 local.yaml 中配置
    base_url: "https://api.deepseek.com/v1"

# ------------------- 模型映射 -------------------
model_mapping:
  gpt-4o-mini: "deepseek-chat"
  deepseek-chat: "deepseek-chat"
    
# ------------------- RAG 配置 -------------------
rag:
  enabled: false  # 暂时禁用，等待 embedding 模型准备好后改为 true
  embedding_model: "simple"  # openai | simple | ollama
  embedding_model_name: "text-embedding-3-small"
  vector_store_path: "outputs/vector_store.pkl"
  retrieval_top_k: 3
  # Ollama 本地 embedding 配置（备用）
  ollama:
    model: "nomic-embed-text"
    base_url: "http://localhost:11434"